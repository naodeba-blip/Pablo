<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pong Game</title>
    <link rel="stylesheet" href="pong.css">
</head>
<body>
    <div class="container">
        <h1>🎮 PONG 🎮</h1>
        
        <div class="scoreboard">
            <div class="score">
                <h2>Player</h2>
                <p id="playerScore">0</p>
            </div>
            <div class="score">
                <h2>Computer</h2>
                <p id="computerScore">0</p>
            </div>
        </div>

        <canvas id="pongCanvas" width="800" height="400"></canvas>

        <div class="instructions">
            <p><strong>🎯 Controls:</strong> Use <strong>Arrow Keys (↑↓)</strong> or <strong>Mouse Movement</strong> to control your paddle</p>
            <p><strong>🤖 The computer controls</strong> the right paddle</p>
            <p><strong>⚽ Goal:</strong> Hit the ball past your opponent to score points!</p>
        </div>
    </div>

    <script src="pong.js"></script>
</body>
</html>
